<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Café Urban</title>
    <link rel="icon" href="images/logo.png" type="image/png" />
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: white;
      }

      .top-section {
        margin-bottom: 20px;
        text-align: center;
      }

      .imagem-formulario {
        max-width: 100%;
        height: auto;
        display: block;
        margin: 0 auto 20px;
      }

      .container {
        width: 600px;
        margin: 0 auto;
        text-align: center;
        border: 1px solid #ccc;
        padding: 30px;
        border-radius: 8px;
        background-color: white;
        font-size: 20px;
      }

      form {
        font-family: "Georgia", serif;
        width: 100%;
        padding: 2em;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      }

      fieldset {
        margin: 1em 0;
        padding: 1em;
        border: none;
        background-color: transparent;
      }

      legend {
        font-weight: bold;
      }

      label {
        display: block;
      }

      label .required {
        font-size: 0.9em;
        color: black;
      }

      input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: 1px solid #ccc;
        border-radius: 10px;
      }

      input[type="button"] {
        background-color: black;
        color: white;
        border: none;
        padding: 10px 20px;
        font-size: 1.2em;
        cursor: pointer;
        border-radius: 5px;
      }

      input[type="button"]:hover {
        background-color: black;
      }

      p {
        margin-bottom: 1em;
      }

      input.error {
        border-color: #ff0000;
        background-color: #ffe6e6;
      }

      label.error {
        color: #ff0000;
      }
    </style>
  </head>
  <body>
    <div class="top-section">
      <img src="images/logo.png" alt="coffee" class="imagem-formulario" />
      <p id="info"></p>
    </div>

    <div class="container">
      <h1>Formulário de Pedido</h1>

      <form id="comments_form" action="#" method="post">
        <fieldset>
          <legend>Informações Sobre o Pedido</legend>
          <p>
            <label for="nome"
              >Nome: <em class="required">(Obrigatório)</em></label
            >
            <input name="nome" id="nome" type="text" />
          </p>
          <p>
            <label for="email">Email:</label>
            <input name="email" id="email" type="text" />
          </p>
          <p>
            <label for="pass">Senha:</label>
            <input name="pass" id="pass" type="password" />
          </p>
        </fieldset>
        <p>
          <input type="button" value="Enviar!" id="btnSubmit" />
        </p>
      </form>
    </div>
    <script src="script.js"></script>
  </body>
</html>
